# ════════════════════════════════════════════════════════
# KUBERNETES SECRETS TEMPLATE
# ════════════════════════════════════════════════════════
# IMPORTANT: DO NOT commit this file to Git with actual values!
# 1. Copy this file to secrets-actual.yaml (not tracked by git)
# 2. Fill in your actual secret values
# 3. Apply using: kubectl apply -f secrets-actual.yaml
# 4. Delete the file with actual secrets after applying
#
# Alternative: Use the generate-secrets.sh script
# ════════════════════════════════════════════════════════

apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: todo-app
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
type: Opaque
stringData:
  # ════════════════════════════════════════════════════════
  # JWT SECURITY (REQUIRED)
  # ════════════════════════════════════════════════════════
  # Generate: python3 -c 'import secrets; print(secrets.token_urlsafe(32))'
  SECRET_KEY: "CHANGE-THIS-TO-RANDOM-32-CHAR-STRING"
  
  # ════════════════════════════════════════════════════════
  # OPENROUTER API (REQUIRED for Qwen Model)
  # ════════════════════════════════════════════════════════
  # Get key from: https://openrouter.ai/keys
  OPENROUTER_API_KEY: "your-openrouter-api-key-here"
  
  # OpenRouter Configuration
  OPENROUTER_BASE_URL: "https://openrouter.ai/api/v1"
  OPENROUTER_REFERER: "http://localhost:30007"
  OPENROUTER_TITLE: "Multi-Phase Todo App"
  
  # ════════════════════════════════════════════════════════
  # GEMINI API (OPTIONAL - Backup Model)
  # ════════════════════════════════════════════════════════
  # Get key from: https://makersuite.google.com/app/apikey
  GEMINI_API_KEY: "your-gemini-api-key-here"
  
  # ════════════════════════════════════════════════════════
  # EMAIL CONFIGURATION (OPTIONAL)
  # ════════════════════════════════════════════════════════
  # For password reset, notifications, etc.
  EMAIL_USERNAME: "your-email-username"
  EMAIL_PASSWORD: "your-email-password"
  SUPPORT_EMAIL: "support@yourdomain.com"
  
  # ════════════════════════════════════════════════════════
  # DATABASE (OPTIONAL - if using Neon)
  # ════════════════════════════════════════════════════════
  # For production with Neon PostgreSQL
  # NEON_DATABASE_URL: "postgresql://user:password@host.region.provider.neon.tech/dbname?sslmode=require"
